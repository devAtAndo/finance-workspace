# Cloudflare Worker for workspace.andofoods.co
# Deploy via OpenNext: `pnpm --filter @ando/workspace cf:deploy`

name = "ando-workspace"
main = ".open-next/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# First-deploy mode: true → publishes to <name>.<subdomain>.workers.dev.
# Flip to false and uncomment [[routes]] after the custom domain is wired.
workers_dev = true

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

# Custom-domain route — uncomment after DNS for workspace.andofoods.co is
# proxied (orange-cloud) in Cloudflare.
# [[routes]]
# pattern = "workspace.andofoods.co"
# custom_domain = true

# Hyperdrive binding for the shared iam Postgres (Supabase project `andofoods-iam`).
# Uncomment after creating the config in Dashboard → Workers & Pages → Hyperdrive
# and replace the id with the real UUID from that page.
# [[hyperdrive]]
# binding = "HYPERDRIVE_IAM"
# id = "replace-with-real-uuid"

# Environment variables. Secrets set via: wrangler secret put CF_ACCESS_AUD_WORKSPACE
[vars]
NODE_ENV = "production"
CF_ACCESS_TEAM_DOMAIN = "ando.cloudflareaccess.com"
WORKSPACE_ENABLED = "false"
# Placeholders — @ando/config/env requires all of these to load. Real values
# replace via `wrangler secret put CF_ACCESS_AUD_WORKSPACE` after Access is
# provisioned.
CF_ACCESS_AUD_WORKSPACE = "placeholder"
CF_ACCESS_AUD_PETTY_CASH = "placeholder"
CF_ACCESS_AUD_RIDER_PAYMENTS = "placeholder"
IAM_DATABASE_URL = "postgres://dummy:dummy@127.0.0.1:5432/dummy"
